name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check
        run: echo "exists=$(test -f frontend/package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present

      - name: Tests
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test --if-present

      - name: Skip (no package.json yet)
        if: steps.check.outputs.exists != 'true'
        run: echo "frontend/package.json absent — étape ignorée en attendant l'initialisation du projet."

  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check
        run: echo "exists=$(test -f backend/package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: npm run lint --if-present

      - name: Tests
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: npm test --if-present

      - name: Skip (no package.json yet)
        if: steps.check.outputs.exists != 'true'
        run: echo "backend/package.json absent — étape ignorée en attendant l'initialisation du projet."
